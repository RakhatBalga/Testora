name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Alembic single-head check
        run: python scripts/check_migration_heads.py

      - name: Validate reading content
        run: python validate_reading.py

      - name: Run tests
        run: pytest -q

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8000
        run: npm run build

  compose-config:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate production compose config
        env:
          POSTGRES_PASSWORD: dummy
          SECRET_KEY: dummy
          AI_PROVIDER: gemini
          GEMINI_API_KEY: dummy
          CORS_ORIGINS: https://app.testora.com
          NEXT_PUBLIC_API_URL: https://api.testora.com
        run: docker compose -f docker-compose.prod.yml config >/dev/null
